name: SecureVote CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Python linter
        run: pip install flake8

      - name: Lint Python
        run: flake8 backend/ --max-line-length=120 --exclude=__pycache__,keys

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint JavaScript
        run: cd frontend && npx eslint src/ --max-warnings=0 || true

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          MONGO_URI: mongodb://localhost:27017/securevote_test
          ELECTION_ID: TEST-ELECTION-001
          SECRET_KEY: test-secret-key
          FLASK_ENV: development
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t securevote-backend ./backend

      - name: Build frontend image
        run: docker build -t securevote-frontend ./frontend

      - name: Verify compose config
        run: docker compose config
